name: CI

on:
  push:
  pull_request:

jobs:
  quick:
    name: Rust quick
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Quick check
        shell: pwsh
        run: ./scripts/check-quick.ps1

  full:
    name: Rust full
    runs-on: ${{ matrix.os }}
    needs: quick
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Full check
        shell: pwsh
        run: ./scripts/check-full.ps1
