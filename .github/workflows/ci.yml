name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all --check
      - name: Check
        run: cargo check --workspace --all-targets
      - name: Check no default grid fixtures
        run: cargo check -p finui-grid --no-default-features
      - name: Clippy
        run: cargo clippy --workspace --all-targets
      - name: Test
        run: cargo test --workspace
